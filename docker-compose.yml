version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    volumes:
      - ./uploads:/app/uploads
      - ./generated:/app/generated
      - ./sample_data:/app/sample_data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - APP_NAME=Monthly Close Checklist Automation Agent
      - DEBUG=True
    env_file:
      - .env
    restart: unless-stopped

volumes:
  uploads:
  generated:
